### Configuration file for Community Firn Model simulations

### ----------------- Processing forcing data ----------------- ###

## Directories
CFM_repo_path: /home/speersm/luna/CPOM/speersm/CommunityFirnModel/CFM_main # path to the Community Firn Model repository, should contain CFM_main folder
MAR_data_path: /home/speersm/luna/CPOM/briggsk/RCM_data/Data/MAR/AIS/27.5km # path to MAR forcing data directory stored on luna
CFM_data_path: /home/speersm/luna/CPOM/speersm/CFM_data # path to store CFM input and output data

# Period
start_year: 1979
end_year: 2024

# Borehole location
borehole_lat: -66.403
borehole_lon: -63.376

## MAR Sector
sector: 1.0 # only take data from this sector in MAR files (think is ice vs non-ice)

## Mapping converting MAR columns to CFM input columns
MAR_to_CFM_column_map:
  TTZ: T2m # 2m above surface temperature
  TI1: TSKIN # surface temperature
  SU: SUBLIM # sublimation
  SHF: QH # sensible heat flux
  LHF: QL # latent heat flux
  SWD: SW_d # downward shortwave radiation
  LWD: LW_d # downward longwave radiation
  RF: RAIN # rainfall
  SF: BDOT # snowfall
  AL2: ALBEDO # surface albedo
  ME: SMELT # melt

### ----------------- CFM Simulation ----------------- ###

## model run parameters
sde: 1995.0 #spin date end
runid: -9999 
rho_bottom: 910 # density at bottom boundary condition
sublim_sf: -1 #sublimation scaling factor, -1 for MERRA2 data, not sure for MAR data but think also -1

## config for CFM_main, will be saved as json in output folder
cfm_config:
  InputFileFolder: CFMinput
  InputFileNameTemp: example_tskin.csv
  InputFileNamebdot: example_smb.csv
  InputFileNameIso: example_isotope.csv
  InputFileNamerho: example_rhos.csv
  InputFileNamemelt: example_melt.csv
  resultsFolder: CFMresults
  initfirnFile: example_firndata.csv
  initprofile: false
  input_type: dataframe
  input_type_options: [csv,dataframe]
  DFresample: 1D
  DFfile: MERRA2_CLIM_df_72.5_-38.75.pkl
  physRho: GSFC2020
  physRho_options: [HLdynamic,HLSigfus,Li2004,Li2011,Helsen2008,Arthern2010S,Arthern2010T,Li2015,Goujon2003,Barnola1991,Morris2014,KuipersMunneke2015,Crocus,Ligtenberg2011]
  MELT: true
  ReehCorrectedT: false
  FirnAir: false
  AirConfigName: AirConfig.json
  TWriteInt: 1
  TWriteStart: 1980.0
  int_type: nearest
  int_type_options: [nearest,linear]
  SeasonalTcycle: false
  SeasonalThemi: north
  coreless: true
  TAmp: 10.0
  physGrain: true
  calcGrainSize: false
  GrGrowPhysics: Arthern
  GrGrowPhysics_options: [Arthern,Katsushima]
  heatDiff: true
  conductivity: Calonne2019
  conductivity_options: [Schwander,Yen_fixed,Yen_var,Anderson,Yen_b,Sturm,VanDusen,Schwerdtfeger,Riche,Jiawen,mix,Calonne2011,Calonne2019]
  variable_srho: false
  srho_type: userinput
  srho_type_options: [userinput,param,noise]
  rhos0: 350.0
  r2s0: 1.0e-8
  AutoSpinUpTime: false
  yearSpin: 20
  H: 3000
  HbaseSpin: 2880.0
  stpsPerYear: 12.0
  D_surf: 1.0
  bdot_type: mean
  bdot_type_options: [instant,mean,stress]
  grid_outputs: true
  grid_output_res: 0.05
  isoDiff: false
  iso: D
  isoOptions: [18,D,NoDiffusion]
  spacewriteint: 1
  strain: false
  du_dx: 1e-5
  outputs: [density,depth,temperature,age,DIP,meltoutputs,grainsize]
  outputs_options: [density,depth,temperature,age,Dcon,bdot_mean,climate,compaction,grainsize,temp_Hx,isotopes,BCO,DIPc,DIP,LWC,gasses,PLWC_mem,viscosity,runoff,refrozen]
  resultsFileName: CFMresults.hdf5
  spinFileName: CFMspin.hdf5
  doublegrid: true
  nodestocombine: 30
  multnodestocombine: 12
  Dnodestocombine: 30
  Dmultnodestocombine: 12
  grid1bottom: 5.0
  grid2bottom: 10.0
  spinup_climate_type: mean
  spinup_climate_type_options: [mean,initial]
  manual_climate: false
  deepT: 255.88
  bdot_long: 0.49073
  manual_iceout: false
  iceout: 0.23
  QMorris: 110.0e3
  timesetup: exact
  timesetup_options: [exact,interp,retmip]
  liquid: bucket
  liquid_options: [percolation_bucket,bucketVV,resingledomain,prefsnowpack]
  merging: false
  merge_min: 1e-4
  LWCcorrect: false
  manualT: false
  no_densification: false
  rad_pen: false
  site_pressure: 1013.25
  output_bits: float32
